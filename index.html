<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Shishirise</title>

<link rel="icon" href="shishir192.png">

<style>
body {
    font-family: Arial;
    margin: 0;
    background: #fff;
}

header {
    text-align: center;
    padding: 30px;
    border-bottom: 2px solid #333;
}

.container {
    width: 80%;
    margin: auto;
}

section {
    background: #fff;
    padding: 20px;
    margin: 20px 0;
    box-shadow: 0 0 10px #ccc;
    border-radius: 10px;
}

/* CHAT BOX */
#chatBox {
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 260px;
    background: white;
    border-radius: 10px;
    box-shadow: 0 0 10px #aaa;
    padding: 10px;
}

#chatHeader {
    font-weight: bold;
    margin-bottom: 10px;
}

#chatMessages {
    height: 180px;
    overflow-y: auto;
    border: 1px solid #eee;
    padding: 5px;
    margin-bottom: 10px;
}

#msg {
    width: 70%;
    padding: 5px;
}

button {
    padding: 6px;
}
</style>
</head>

<body>

<header>
    <h1>Shishir Adhikari</h1>
    <p>Software Developer | AI Enthusiast</p>
</header>

<div class="container">
    <section>
        <h2>About</h2>
        <p>Welcome to Shishirise portfolio.</p>
    </section>
</div>

<!-- CHAT UI -->
<div id="chatBox">
    <div id="chatHeader">💬 Chat</div>
    <div id="chatMessages"></div>
    <input id="msg" placeholder="Type message..." />
    <button onclick="sendMessage()">Send</button>
</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyARBw3pgnhRbEjxywrKIWTftMsA1KPVf8g",
  authDomain: "shishirise.firebaseapp.com",
  projectId: "shishirise",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// SEND MESSAGE
window.sendMessage = async function() {
  const msg = document.getElementById("msg").value;
  if (!msg) return;

  await addDoc(collection(db, "messages"), {
    text: msg,
    time: new Date()
  });

  document.getElementById("msg").value = "";
};

// RECEIVE MESSAGES (REAL-TIME)
const chatDiv = document.getElementById("chatMessages");

onSnapshot(collection(db, "messages"), (snapshot) => {
  chatDiv.innerHTML = "";
  snapshot.forEach(doc => {
    const data = doc.data();
    chatDiv.innerHTML += `<div>${data.text}</div>`;
  });
});
</script>

</body>
</html>
