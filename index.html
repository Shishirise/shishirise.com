<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Shishirise</title>

<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#000">

<style>
body { font-family: Arial; margin: 0; background: #fff; }

header {
    text-align: center;
    padding: 30px;
    border-bottom: 2px solid #333;
}

.container {
    width: 80%;
    margin: auto;
}

section {
    background: #fff;
    padding: 20px;
    margin: 20px 0;
    box-shadow: 0 0 10px #ccc;
    border-radius: 10px;
}

/* CHAT BOX */
#chatBox {
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 270px;
    background: white;
    border-radius: 10px;
    box-shadow: 0 0 10px #aaa;
    padding: 10px;
}

#chatMessages {
    height: 180px;
    overflow-y: auto;
    margin-bottom: 10px;
}

#msg {
    width: 70%;
    padding: 5px;
}
</style>
</head>

<body>

<header>
<h1>Shishir Adhikari</h1>
<p>Software Developer | AI Enthusiast</p>

<button onclick="enableNotifications()">🔔 Enable Notifications</button>
</header>

<div class="container">
<section>
<h2>About</h2>
<p>Welcome to Shishirise portfolio.</p>
</section>
</div>

<!-- CHAT -->
<div id="chatBox">
<div id="chatMessages"></div>
<input id="msg" placeholder="Type message..." />
<button onclick="sendMessage()">Send</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getMessaging, getToken } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-messaging.js";

const firebaseConfig = {
  apiKey: "AIzaSyARBw3pgnhRbEjxywrKIWTftMsA1KPVf8g",
  authDomain: "shishirise.firebaseapp.com",
  projectId: "shishirise",
  messagingSenderId: "488840494684",
  appId: "1:488840494684:web:446724e7de437d510f3099"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const messaging = getMessaging(app);

// 🔔 ENABLE NOTIFICATIONS
window.enableNotifications = async function() {
  const permission = await Notification.requestPermission();

  if (permission === "granted") {
    const token = await getToken(messaging, {
      vapidKey: "BECsh4K2WcHyMk7irq63lr1p1n8E7C17qmuefr4Uewjo-1Rc5ABCFnA0-Xlh30Df9Zx0XlKxygmW_wwh7di8tb8"
    });

    console.log("TOKEN:", token);
    alert("Notifications enabled!");
  }
};

// 💬 SEND MESSAGE
window.sendMessage = async function() {
  const msg = document.getElementById("msg").value;
  if (!msg) return;

  await addDoc(collection(db, "messages"), {
    text: msg,
    time: new Date()
  });

  document.getElementById("msg").value = "";

  // 🔔 Notification (when open)
  if (Notification.permission === "granted") {
    new Notification("New Message", {
      body: msg
    });
  }
};

// 💬 REAL-TIME CHAT
const chatDiv = document.getElementById("chatMessages");

onSnapshot(collection(db, "messages"), (snapshot) => {
  chatDiv.innerHTML = "";
  snapshot.forEach(doc => {
    chatDiv.innerHTML += `<div>${doc.data().text}</div>`;
  });
});
</script>

</body>
</html>
